nerdfont: true

merge_strategy: rebase
agent: claude

files:
  copy:
    - apps/motori/.env
    - apps/talli/.env
  symlink:
    - .claude/settings.local.json

post_create:
  - mise trust
  - bash -c "docker compose up -d db && pnpm install && pnpm db:migrate && DEPLOY_APP=talli pnpm db:migrate && pnpm db:seed"

pre_remove:
  - docker compose down -v

panes:
  - command: <agent>
    focus: true
  - command: pnpm dev
    split: vertical
