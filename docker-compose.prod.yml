name: motori

services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: appdb
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - /var/lib/motori/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrator
    restart: "no"
    env_file: /etc/motori.env
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
      args:
        BETTER_AUTH_URL: https://motori.fi
    restart: unless-stopped
    env_file: /etc/motori.env
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/motori.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/ssl/motori.fi.pem:/etc/ssl/motori.fi.pem:ro
      - /etc/ssl/motori.fi.key:/etc/ssl/motori.fi.key:ro
    depends_on:
      - app
