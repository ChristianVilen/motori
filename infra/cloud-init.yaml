#cloud-config
package_update: true
package_upgrade: true

# Run before package_upgrade to silence needrestart's interactive kernel/service prompts,
# which otherwise hang cloud-init forever on a console nobody's watching.
bootcmd:
  - mkdir -p /etc/needrestart/conf.d
  - printf '$nrconf{restart} = "a";\n$nrconf{kernelhints} = 0;\n' > /etc/needrestart/conf.d/no-interactive.conf

apt:
  conf: |
    Acquire::Retries "3";
    DPkg::Options { "--force-confdef"; "--force-confold"; };

packages:
  - curl
  - git
  - ufw
  - unzip
  - ca-certificates

write_files:
  - path: /etc/db-backup.env
    permissions: '0600'
    content: |
      BACKUP_S3_ENDPOINT=${backup_s3_endpoint}
      BACKUP_S3_BUCKET=${backup_s3_bucket}
      AWS_ACCESS_KEY_ID=${backup_s3_access_key}
      AWS_SECRET_ACCESS_KEY=${backup_s3_secret_key}
      AWS_DEFAULT_REGION=${backup_s3_region}

  - path: /usr/local/bin/db-backup
    permissions: '0755'
    content: |
      #!/bin/bash
      set -euo pipefail
      . /etc/db-backup.env
      TIMESTAMP=$$(date +%Y%m%d-%H%M%S)
      docker compose --env-file /etc/motori.env -f /opt/motori/docker-compose.prod.yml exec -T db \
        pg_dump -U appuser appdb | gzip | \
        aws s3 cp - "s3://$$BACKUP_S3_BUCKET/db-backups/pgdump-$$TIMESTAMP.sql.gz" \
          --endpoint-url "$$BACKUP_S3_ENDPOINT"
      # Prune oldest dumps, keep newest 30. Sort by filename (column 4) so listing format changes don't break us.
      aws s3 ls "s3://$$BACKUP_S3_BUCKET/db-backups/" --endpoint-url "$$BACKUP_S3_ENDPOINT" \
        | awk '{print $$4}' | grep -E '^pgdump-' | sort | head -n -30 \
        | xargs -r -I{} aws s3 rm "s3://$$BACKUP_S3_BUCKET/db-backups/{}" \
          --endpoint-url "$$BACKUP_S3_ENDPOINT"

  - path: /etc/cron.d/db-backup
    permissions: '0644'
    content: |
      0 2 * * * root /usr/local/bin/db-backup >> /var/log/db-backup.log 2>&1

  - path: /etc/motori.env
    permissions: '0600'
    content: |
      # Filled in on first deploy. DATABASE_URL and DB_PASSWORD are appended by cloud-init below.
      NODE_ENV=production
      PORT=3000

runcmd:
  # Wait for time sync before any HTTPS — first boot clock can be 1970 and break TLS
  - systemctl start systemd-timesyncd
  - timedatectl set-ntp true
  - until timedatectl show -p NTPSynchronized --value | grep -q yes; do sleep 1; done

  # Mount the persistent pgdata volume. Docker bind-mounts the container's data dir onto this path.
  - until [ -b /dev/disk/by-id/scsi-0HC_Volume_${pgdata_volume_id} ]; do sleep 1; done
  - blkid /dev/disk/by-id/scsi-0HC_Volume_${pgdata_volume_id} | grep -q 'TYPE="ext4"' || mkfs.ext4 -F /dev/disk/by-id/scsi-0HC_Volume_${pgdata_volume_id}
  - mkdir -p /var/lib/motori/pgdata
  - echo '/dev/disk/by-id/scsi-0HC_Volume_${pgdata_volume_id} /var/lib/motori/pgdata ext4 defaults,nofail 0 2' >> /etc/fstab
  - mount /var/lib/motori/pgdata

  # Install AWS CLI v2 (Ubuntu 24.04 dropped the apt awscli package)
  - curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
  - unzip -q /tmp/awscliv2.zip -d /tmp
  - /tmp/aws/install
  - rm -rf /tmp/awscliv2.zip /tmp/aws

  # Install Docker Engine + compose plugin from Docker's official apt repo
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - sh -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" > /etc/apt/sources.list.d/docker.list'
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # Configure UFW (backup firewall — Hetzner firewall is the primary)
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw allow in on tailscale0
  - ufw --force enable

  # Harden SSH: disable password auth, root password login
  - sed -i 's/^#*PasswordAuthentication.*/PasswordAuthentication no/' /etc/ssh/sshd_config
  - sed -i 's/^#*PermitRootLogin.*/PermitRootLogin prohibit-password/' /etc/ssh/sshd_config
  - systemctl reload ssh

  # Install and connect Tailscale
  - curl -fsSL https://tailscale.com/install.sh | sh
  - tailscale up --authkey='${tailscale_auth_key}' --ssh --advertise-tags=tag:server

  # Create deploy directory. Root owns it; docker daemon runs as root anyway.
  - mkdir -p /opt/motori
  - mkdir -p /etc/ssl

  # Wire DB credentials into the env file (cloud-init knows the password). The compose file
  # reads DB_PASSWORD to set POSTGRES_PASSWORD on the db service, and DATABASE_URL is what
  # the app + migrate services consume.
  - echo "DB_PASSWORD=${db_password}" >> /etc/motori.env
  - echo "DATABASE_URL=postgresql://appuser:${db_password}@db:5432/appdb" >> /etc/motori.env

  # Record the configured domain for later (Certbot, etc.)
  - echo "${domain}" > /etc/app-domain
