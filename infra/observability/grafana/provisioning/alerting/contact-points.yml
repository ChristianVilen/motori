apiVersion: 1

# Email contact point. SMTP itself is configured via GF_SMTP_* env (Resend gateway —
# see DEPLOY.md §11). Recipient comes from the ALERT_EMAIL_TO env on the Grafana app.
contactPoints:
  - orgId: 1
    name: email
    receivers:
      - uid: motori-email
        type: email
        settings:
          addresses: "$__env{ALERT_EMAIL_TO}"
          singleEmail: true

policies:
  - orgId: 1
    receiver: email
    group_by: ["grafana_folder", "alertname"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
