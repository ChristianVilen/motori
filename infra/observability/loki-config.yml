# Loki single-binary, filesystem storage. Suitable for a single small VPS.
# 30-day retention enforced by the compactor. Logs are recreatable, so chunks are
# NOT backed up (only grafana.db is — see DEPLOY.md §11).
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 720h # 30 days
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  # requestId is attached as structured metadata by Promtail; allow it.
  allow_structured_metadata: true
  volume_enabled: true

compactor:
  working_directory: /loki/compactor
  delete_request_store: filesystem
  retention_enabled: true
  retention_delete_delay: 2h
  compaction_interval: 10m

ruler:
  storage:
    type: local
    local:
      directory: /loki/rules
  rule_path: /loki/rules-tmp
  enable_api: true

analytics:
  reporting_enabled: false
